<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Web Bookmark - Andrean</title>

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(rgba(10,25,47,0.85), rgba(10,25,47,0.85)),
        url("https://th.bing.com/th/id/OIP.gM8pAqwLZTQ1VykZtyzlnAHaEK?o=7rm=3&rs=1&pid=ImgDetMain&o=7&rm=3")
        no-repeat center center fixed;
        background-size: cover;
        color: #fff;
    }

    .container {
        max-width: 1100px;
        margin: 40px auto;
        padding: 20px;
    }

    h1 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 600;
    }

    .input-box {
        background: rgba(255,255,255,0.05);
        padding: 22px;
        border-radius: 16px;
        backdrop-filter: blur(8px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        margin-bottom: 30px;
    }

    .input-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .input-row input {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    button.add-btn {
        background: #3b82f6;
        padding: 12px 20px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 700;
        transition: 0.2s;
    }

    button.add-btn:hover {
        background: #2563eb;
    }

    .filter-bar {
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .tag-filter {
        padding: 8px 15px;
        background: rgba(255,255,255,0.1);
        border-radius: 30px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
    }

    .tag-filter.active {
        background: #3b82f6;
    }

    .search-box {
        margin-bottom: 20px;
    }

    .search-box input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: none;
        background: rgba(255,255,255,0.1);
        color: #fff;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(10px);
        padding: 18px;
        border-radius: 18px;
        box-shadow: 0 12px 35px rgba(0,0,0,0.35);
        transition: 0.25s;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    }

    .card-title {
        font-size: 18px;
        margin-bottom: 6px;
        font-weight: 600;
    }

    .card-url {
        font-size: 13px;
        color: #cbd5e1;
        margin-bottom: 10px;
    }

    .tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 12px;
    }

    .tag {
        padding: 5px 12px;
        font-size: 12px;
        background: rgba(59,130,246,0.35);
        border-radius: 20px;
        backdrop-filter: blur(4px);
    }

    .card-buttons {
        display: flex;
        justify-content: space-between;
    }

    .open-btn {
        background: #2563eb;
        padding: 8px 14px;
        border-radius: 8px;
        text-decoration: none;
        color: #fff;
        font-size: 14px;
        font-weight: 600;
    }

    .del-btn {
        background: #ef4444;
        padding: 8px 14px;
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        font-weight: 600;
    }
</style>
</head>

<body>
<div class="container">
    <h1>Web Bookmark</h1>

    <div class="input-box">
        <div class="input-row">
            <input id="nameInput" type="text" placeholder="Nama Web">
            <input id="urlInput" type="text" placeholder="URL">
            <input id="tagInput" type="text" placeholder="Kategori (pisahkan dengan koma)">
            <button class="add-btn" onclick="addLink()">Tambah</button>
        </div>
    </div>

    <div class="search-box">
        <input id="searchInput" type="text" placeholder="Cari berdasarkan nama atau tag..." oninput="renderLinks()">
    </div>

    <div class="filter-bar" id="filterBar"></div>

    <div class="grid" id="grid"></div>
</div>

<script>
let links = JSON.parse(localStorage.getItem("links") || "[]");
let activeTag = "All";

function save() {
    localStorage.setItem("links", JSON.stringify(links));
}

function parseTags(text) {
    return text
        .split(",")
        .map(t => t.trim().toLowerCase())
        .filter(t => t.length);
}

function addLink() {
    const name = document.getElementById("nameInput").value.trim();
    const url = document.getElementById("urlInput").value.trim();
    const tags = parseTags(document.getElementById("tagInput").value);

    if (!name || !url) return alert("Nama & URL wajib diisi!");

    links.push({ name, url, tags });
    save();

    document.getElementById("nameInput").value = "";
    document.getElementById("urlInput").value = "";
    document.getElementById("tagInput").value = "";

    renderLinks();
}

function deleteLink(i) {
    links.splice(i, 1);
    save();
    renderLinks();
}

function getAllTags() {
    const set = new Set(["All"]);
    (links || []).forEach(l => {
        if (l.tags && Array.isArray(l.tags)) {
            l.tags.forEach(t => set.add(t));
        }
    });
    return [...set];
}

function renderFilters() {
    const bar = document.getElementById("filterBar");
    bar.innerHTML = "";

    getAllTags().forEach(tag => {
        const div = document.createElement("div");
        div.className = "tag-filter" + (tag === activeTag ? " active" : "");
        div.textContent = tag;
        div.onclick = () => { activeTag = tag; renderLinks(); };
        bar.appendChild(div);
    });
}

function renderLinks() {
    renderFilters();

    const grid = document.getElementById("grid");
    const search = document.getElementById("searchInput").value.toLowerCase();

    grid.innerHTML = "";

    (links || [])
        .filter(l => {
            const inTag = (activeTag === "All" || (l.tags && l.tags.includes(activeTag)));
            const inSearch =
                l.name.toLowerCase().includes(search) ||
                (l.tags && l.tags.join(" ").includes(search));
            return inTag && inSearch;
        })
        .forEach((l, i) => {
            const card = document.createElement("div");
            card.className = "card";

            const tagHtml = (l.tags || [])
                .map(t => `<span class="tag">${t}</span>`)
                .join("");

            card.innerHTML = `
                <div class="card-title">${l.name}</div>
                <div class="card-url">${l.url}</div>
                <div class="tags">${tagHtml}</div>
                <div class="card-buttons">
                    <a class="open-btn" href="${l.url}" target="_blank">Open</a>
                    <button class="del-btn" onclick="deleteLink(${i})">Delete</button>
                </div>
            `;

            grid.appendChild(card);
        });
}

renderLinks();
</script>
</body>
</html>
